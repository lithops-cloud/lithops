0" text-anchor="start">work queue</text><text x="74.0" y="298" class="mut" font-size="10.5" text-anchor="start">calls dispatched to procs</text><rect x="58.0" y="326" width="297.3333333333333" height="58" rx="10" fill="#111827" stroke="#243049" stroke-width="1.4"/><rect x="58.0" y="326" width="4" height="58" rx="2" fill="#2ec5ff"/><text x="74.0" y="350" class="lbl" font-size="12.5" font-weight="600" text-anchor="start">local filesystem</text><text x="74.0" y="368" class="mut" font-size="10.5" text-anchor="start">acts as storage</text><text x="206.66666666666666" y="444" class="mut2" font-size="10.5" text-anchor="middle">for laptops and small data</text><rect x="393.3333333333333" y="100" width="333.3333333333333" height="360" rx="16" fill="#0c1424" stroke="#243049" stroke-width="1.4"/><rect x="393.3333333333333" y="100" width="333.3333333333333" height="46" rx="16" fill="#ff8c1a" opacity="0.14"/><text x="415.3333333333333" y="128" class="lbl" font-size="15" font-weight="700" letter-spacing="0.5" text-anchor="start">SERVERLESS</text><text x="415.3333333333333" y="166" class="mut" font-size="11" text-anchor="start">FaaS &amp; CaaS · elastic scale</text><rect x="411.3333333333333" y="186" width="297.3333333333333" height="58" rx="10" fill="#111827" stroke="#243049" stroke-width="1.4"/><rect x="411.3333333333333" y="186" width="4" height="58" rx="2" fill="#ff8c1a"/><text x="427.3333333333333" y="210" class="lbl" font-size="12.5" font-weight="600" text-anchor="start">FaaS — async invoke</text><text x="427.3333333333333" y="228" class="mut" font-size="10.5" text-anchor="start">Lambda, Cloud Functions…</text><rect x="411.3333333333333" y="256" width="297.3333333333333" height="58" rx="10" fill="#111827" stroke="#243049" stroke-width="1.4"/><rect x="411.3333333333333" y="256" width="4" height="58" rx="2" fill="#ff8c1a"/><text x="427.3333333333333" y="280" class="lbl" font-size="12.5" font-weight="600" text-anchor="start">Batch / CaaS — job run</text><text x="427.3333333333333" y="298" class="mut" font-size="10.5" text-anchor="start">Code Engine, K8s, Knative</text><rect x="411.3333333333333" y="326" width="297.3333333333333" height="58" rx="10" fill="#111827" stroke="#243049" stroke-width="1.4"/><rect x="411.3333333333333" y="326" width="4" height="58" rx="2" fill="#ff8c1a"/><text x="427.3333333333333" y="350" class="lbl" font-size="12.5" font-weight="600" text-anchor="start">token-bucket rate limit</text><text x="427.3333333333333" y="368" class="mut" font-size="10.5" text-anchor="start">thousands of calls</text><text x="560.0" y="444" class="mut2" font-size="10.5" text-anchor="middle">highly parallel, short tasks</text><rect x="746.6666666666666" y="100" width="333.3333333333333" height="360" rx="16" fill="#0c1424" stroke="#243049" stroke-width="1.4"/><rect x="746.6666666666666" y="100" width="333.3333333333333" height="46" rx="16" fill="#37d67a" opacity="0.14"/><text x="768.6666666666666" y="128" class="lbl" font-size="15" font-weight="700" letter-spacing="0.5" text-anchor="start">STANDALONE</text><text x="768.6666666666666" y="166" class="mut" font-size="11" text-anchor="start">VM master–worker (1:N)</text><rect x="764.6666666666666" y="186" width="297.3333333333333" height="58" rx="10" fill="#111827" stroke="#243049" stroke-width="1.4"/><rect x="764.6666666666666" y="186" width="4" height="58" rx="2" fill="#37d67a"/><text x="780.6666666666666" y="210" class="lbl" font-size="12.5" font-weight="600" text-anchor="start">master VM + Redis</text><text x="780.6666666666666" y="228" class="mut" font-size="10.5" text-anchor="start">task queue coordinator</text><rect x="764.6666666666666" y="256" width="297.3333333333333" height="58" rx="10" fill="#111827" stroke="#243049" stroke-width="1.4"/><rect x="764.6666666666666" y="256" width="4" height="58" rx="2" fill="#37d67a"/><text x="780.6666666666666" y="280" class="lbl" font-size="12.5" font-weight="600" text-anchor="start">worker VMs</text><text x="780.6666666666666" y="298" class="mut" f