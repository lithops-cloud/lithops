<defs><marker id="acy" markerWidth="9" markerHeight="9" refX="6.4" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#2563eb"/></marker><marker id="aor" markerWidth="9" markerHeight="9" refX="6.4" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#ea580c"/></marker><marker id="agr" markerWidth="9" markerHeight="9" refX="6.4" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#16a34a"/></marker><marker id="amut" markerWidth="9" markerHeight="9" refX="6.4" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#6b7280"/></marker></defs><text x="24" y="34" class="title" font-size="17" text-anchor="start">Execution modes</text><text x="24" y="55" class="mut" font-size="12" text-anchor="start">The same code runs unmodified — only the backend in your config changes.</text><rect x="24.0" y="82" width="344.0" height="336" rx="14" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.3"/><rect x="24.0" y="82" width="344.0" height="42" rx="14" fill="#2563eb" opacity="0.10"/><text x="44.0" y="109" class="cy" font-size="14.5" font-weight="700" letter-spacing="0.4" text-anchor="start">LOCALHOST</text><text x="44.0" y="144" class="mut" font-size="11" text-anchor="start">development &amp; testing</text><rect x="40.0" y="162" width="312.0" height="52" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.3"/><rect x="40.0" y="162" width="4" height="52" rx="2" fill="#2563eb"/><text x="56.0" y="184" class="lbl m" font-size="12.5" font-weight="600" text-anchor="start">Python multiprocessing</text><text x="56.0" y="201" class="mut" font-size="10.5" text-anchor="start">master process + pool</text><rect x="40.0" y="226" width="312.0" height="52" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.3"/><rect x="40.0" y="226" width="4" height="52" rx="2" fill="#2563eb"/><text x="56.0" y="248" class="lbl m" font-size="12.5" font-weight="600" text-anchor="start">work queue</text><text x="56.0" y="265" class="mut" font-size="10.5" text-anchor="start">calls dispatched to procs</text><rect x="40.0" y="290" width="312.0" height="52" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.3"/><rect x="40.0" y="290" width="4" height="52" rx="2" fill="#2563eb"/><text x="56.0" y="312" class="lbl m" font-size="12.5" font-weight="600" text-anchor="start">local filesystem</text><text x="56.0" y="329" class="mut" font-size="10.5" text-anchor="start">acts as storage</text><text x="196.0" y="404" class="mut2" font-size="10.5" text-anchor="middle">for laptops and small data</text><rect x="388.0" y="82" width="344.0" height="336" rx="14" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.3"/><rect x="388.0" y="82" width="344.0" height="42" rx="14" fill="#ea580c" opacity="0.10"/><text x="408.0" y="109" class="or" font-size="14.5" font-weight="700" letter-spacing="0.4" text-anchor="start">SERVERLESS</text><text x="408.0" y="144" class="mut" font-size="11" text-anchor="start">FaaS &amp; CaaS · elastic scale</text><rect x="404.0" y="162" width="312.0" height="52" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.3"/><rect x="404.0" y="162" width="4" height="52" rx="2" fill="#ea580c"/><text x="420.0" y="184" class="lbl m" font-size="12.5" font-weight="600" text-anchor="start">FaaS — async invoke</text><text x="420.0" y="201" class="mut" font-size="10.5" text-anchor="start">Lambda, Cloud Functions…</text><rect x="404.0" y="226" width="312.0" height="52" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.3"/><rect x="404.0" y="226" width="4" height="52" rx="2" fill="#ea580c"/><text x="420.0" y="248" class="lbl m" font-size="12.5" font-weight="600" text-anchor="start">Batch / CaaS — job run</text><text x="420.0" y="265" class="mut" font-size="10.5" text-anchor="start">Code Engine, K8s, Knative</text><rect x="404.0" y="290" width="312.0" height="52" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.3"/><rect x="404.0" y="290" width="4" height="52" rx="2" fill="#ea580c"/><text x="420.0" y="312" class="lbl m" font-size="12.5" font-weight="600" text-anchor="start">token-bucket rate limit</text><text x="420.0" y="329" class="mut" font-size="10.5" text-anchor="start">thousands of calls</text><text x="560.0" y="404" class="mut2" font-size="10.5" text-anchor="middle">highly parallel, short tasks</text><rect x="752.0" y="82" width="344.0" height="336" rx="14" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.3"/><rect x="752.0" y="82" width="344.0" height="42" rx="14" fill="#16a34a" opacity="0.10"/><text x="772.0" y="109" class="gr" font-size="14.5" font-weight="700" letter-spacing="0.4" text-anchor="start">STANDALONE</text><text x="772.0" y="144" class="mut" font-size="11" text-anchor="start">VM master–worker (1:N)</text><rect x="768.0" y="162" width="312.0" height="52" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.3"/><rect x="768.0" y="162" width="4" height="52" rx="2" fill="#16a34a"/><text x="784.0" y="184" class="lbl m" font-size="12.5" font-weight="600" text-anchor="start">master VM + Redis</text><text x="784.0" y="201" class="mut" font-size="10.5" text-anchor="start">task queue coordinator</text><rect x="768.0" y="226" width="312.0" height="52" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.3"/><rect x="768.0" y="226" width="4" height="52" rx="2" fill="#16a34a"/><text x="784.0" y="248" class="lbl m" font-size="12.5" font-weight="600" text-anchor="start">worker VMs</text><text x="784.0" y="265" class="mut" font-size="10.5" text-anchor="start">pull &amp; run tasks</text><rect x="768.0" y="290" width="312.0" height="52" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.3"/><rect x="768.0" y="290" width="4" height="52" rx="2" fill="#16a34a"/><text x="784.0" y="312" class="lbl m" font-size="12.5" font-weight="600" text-anchor="start">CREATE · REUSE · CONSUME</text><text x="784.0" y="329" class="mut" font-size="10.5" text-anchor="start">VM lifecycle patterns</text><text x="924.0" y="404" class="mut2" font-size="10.5" text-anchor="middle">long jobs, custom VMs, HPC</text></svg>