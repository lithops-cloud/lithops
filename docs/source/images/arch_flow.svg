<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 540" width="1120" height="540">
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;}
    .m{font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;}
    .title{fill:#1f2937;font-weight:700;}
    .lbl{fill:#1f2937;}
    .mut{fill:#6b7280;} .mut2{fill:#9ca3af;}
    .cy{fill:#2563eb;} .or{fill:#ea580c;} .gr{fill:#16a34a;} .pk{fill:#db2777;}
  </style>
<defs><marker id="acy" markerWidth="9" markerHeight="9" refX="6.4" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#2563eb"/></marker><marker id="aor" markerWidth="9" markerHeight="9" refX="6.4" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#ea580c"/></marker><marker id="agr" markerWidth="9" markerHeight="9" refX="6.4" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#16a34a"/></marker><marker id="amut" markerWidth="9" markerHeight="9" refX="6.4" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#6b7280"/></marker></defs><text x="24" y="34" class="title" font-size="17" text-anchor="start">Execution flow of a map() call</text><text x="24" y="55" class="mut" font-size="12" text-anchor="start">One map() becomes one job, fanned out as independent calls. map_reduce() runs a map job then a reduce job.</text><rect x="40" y="84" width="316" height="416" rx="12" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.3"/><rect x="40" y="84" width="316" height="34" rx="12" fill="#2563eb" opacity="0.10"/><text x="198.0" y="106" class="lbl" font-size="12" font-weight="700" text-anchor="middle">CLIENT</text><text x="198.0" y="132" class="mut m" font-size="10" text-anchor="middle">FunctionExecutor · Invoker</text><rect x="404" y="84" width="316" height="416" rx="12" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.3"/><rect x="404" y="84" width="316" height="34" rx="12" fill="#ea580c" opacity="0.10"/><text x="562.0" y="106" class="lbl" font-size="12" font-weight="700" text-anchor="middle">OBJECT STORAGE</text><text x="562.0" y="132" class="mut m" font-size="10" text-anchor="middle">shared bucket</text><rect x="768" y="84" width="316" height="416" rx="12" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.3"/><rect x="768" y="84" width="316" height="34" rx="12" fill="#16a34a" opacity="0.10"/><text x="926.0" y="106" class="lbl" font-size="12" font-weight="700" text-anchor="middle">WORKER ×N</text><text x="926.0" y="132" class="mut m" font-size="10" text-anchor="middle">handler · JobRunner</text><rect x="58" y="138" width="280" height="48" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.3"/><circle cx="79" cy="162" r="12" fill="#2563eb" opacity="0.14"/><text x="79" y="166" class="cy" font-size="12" font-weight="700" text-anchor="middle">1</text><text x="100" y="158" class="lbl" font-size="12.5" font-weight="600" text-anchor="start">Create the job</text><text x="100" y="175" class="mut m" font-size="10.5" text-anchor="start">map() → create_map_job()</text><rect x="58" y="200" width="280" height="48" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.3"/><circle cx="79" cy="224" r="12" fill="#2563eb" opacity="0.14"/><text x="79" y="228" class="cy" font-size="12" font-weight="700" text-anchor="middle">2</text><text x="100" y="220" class="lbl" font-size="12.5" font-weight="600" text-anchor="start">Serialize &amp; partition</text><text x="100" y="237" class="mut m" font-size="10.5" text-anchor="start">cloudpickle · partitioner</text><rect x="422" y="262" width="280" height="48" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.3"/><circle cx="443" cy="286" r="12" fill="#ea580c" opacity="0.14"/><text x="443" y="290" class="or" font-size="12" font-weight="700" text-anchor="middle">3</text><text x="464" y="282" class="lbl" font-size="12.5" font-weight="600" text-anchor="start">Upload code &amp; data</text><text x="464" y="299" class="mut m" font-size="10.5" text-anchor="start">func_key + agg_data</text><rect x="58" y="324" width="280" height="48" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.3"/><circle cx="79" cy="348" r="12" fill="#2563eb" opacity="0.14"/><text x="79" y="352" class="cy" font-size="12" font-weight="700" text-anchor="middle">4</text><text x="100" y="344" class="lbl" font-size="12.5" font-weight="600" text-anchor="start">Dispatch calls</text><text x="100" y="361" class="mut m" font-size="10.5" text-anchor="start">Invoker.run() → backend.invoke()</text><rect x="786" y="324" width="280" height="48" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.3"/><circle cx="807" cy="348" r="12" fill="#16a34a" opacity="0.14"/><text x="807" y="352" class="gr" font-size="12" font-weight="700" text-anchor="middle">5</text><text x="828" y="344" class="lbl" font-size="12.5" font-weight="600" text-anchor="start">Worker starts</text><text x="828" y="361" class="mut m" font-size="10.5" text-anchor="start">entry_point → function_handler</text><rect x="786" y="386" width="280" height="48" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.3"/><circle cx="807" cy="410" r="12" fill="#16a34a" opacity="0.14"/><text x="807" y="414" class="gr" font-size="12" font-weight="700" text-anchor="middle">6</text><text x="828" y="406" class="lbl" font-size="12.5" font-weight="600" text-anchor="start">Run the call</text><text x="828" y="423" class="mut m" font-size="10.5" text-anchor="start">JobRunner: get input, execute</text><rect x="422" y="448" width="280" height="48" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.3"/><circle cx="443" cy="472" r="12" fill="#ea580c" opacity="0.14"/><text x="443" y="476" class="or" font-size="12" font-weight="700" text-anchor="middle">7</text><text x="464" y="468" class="lbl" font-size="12.5" font-weight="600" text-anchor="start">Write output &amp; status</text><text x="464" y="485" class="mut m" font-size="10.5" text-anchor="start">one object per call</text><path d="M338,162 C 382,162 378,286 422,286" fill="none" stroke="#ea580c" stroke-width="1.7" marker-end="url(#aor)"/><path d="M338,348 C 382,348 742,348 786,348" fill="none" stroke="#2563eb" stroke-width="1.7" marker-end="url(#acy)"/><path d="M926.0,434 C 762,434 726,472 702,472" fill="none" stroke="#ea580c" stroke-width="1.7" marker-end="url(#aor)"/><path d="M422,472 C 378,472 382,236 338,212" fill="none" stroke="#16a34a" stroke-width="1.7" stroke-dasharray="5 5" marker-end="url(#agr)"/><text x="400" y="232" class="gr m" font-size="10.5" text-anchor="middle">wait() / get_result()</text><text x="400" y="248" class="mut2" font-size="9.5" text-anchor="middle">poll or RabbitMQ</text></svg>