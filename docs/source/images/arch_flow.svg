<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 560" width="1120" height="560">
  <style>
    text{font-family:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;}
    .s{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;}
    .title{fill:#e7ecf5;font-weight:700;}
    .lbl{fill:#e7ecf5;}
    .mut{fill:#9aa6be;}
    .mut2{fill:#66738d;}
    .cy{fill:#2ec5ff;} .or{fill:#ff8c1a;} .gr{fill:#37d67a;} .pk{fill:#ff8ab3;}
  </style>
<defs><marker id="acy" markerWidth="9" markerHeight="9" refX="6.4" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#2ec5ff"/></marker><marker id="aor" markerWidth="9" markerHeight="9" refX="6.4" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#ff8c1a"/></marker><marker id="agr" markerWidth="9" markerHeight="9" refX="6.4" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#37d67a"/></marker><marker id="amut" markerWidth="9" markerHeight="9" refX="6.4" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#9aa6be"/></marker></defs><rect x="0" y="0" width="1120" height="560" rx="18" fill="#0b1120"/><text x="40" y="46" class="title" font-size="20" text-anchor="start">Execution flow of a map() call</text><text x="40" y="68" class="mut" font-size="12" text-anchor="start">One map() becomes one job, fanned out as independent calls. map_reduce() runs a map job then a reduce job.</text><rect x="60" y="100" width="300" height="420" rx="14" fill="#0c1424" stroke="#243049" stroke-width="1.4"/><rect x="60" y="100" width="300" height="34" rx="14" fill="#2ec5ff" opacity="0.14"/><text x="210.0" y="122" class="lbl" font-size="12" font-weight="700" text-anchor="middle">CLIENT</text><text x="210.0" y="148" class="mut" font-size="10" text-anchor="middle">FunctionExecutor · Invoker</text><rect x="410" y="100" width="300" height="420" rx="14" fill="#0c1424" stroke="#243049" stroke-width="1.4"/><rect x="410" y="100" width="300" height="34" rx="14" fill="#ff8c1a" opacity="0.14"/><text x="560.0" y="122" class="lbl" font-size="12" font-weight="700" text-anchor="middle">OBJECT STORAGE</text><text x="560.0" y="148" class="mut" font-size="10" text-anchor="middle">shared bucket</text><rect x="760" y="100" width="300" height="420" rx="14" fill="#0c1424" stroke="#243049" stroke-width="1.4"/><rect x="760" y="100" width="300" height="34" rx="14" fill="#37d67a" opacity="0.14"/><text x="910.0" y="122" class="lbl" font-size="12" font-weight="700" text-anchor="middle">WORKER ×N</text><text x="910.0" y="148" class="mut" font-size="10" text-anchor="middle">handler · JobRunner</text><rect x="78" y="156" width="264" height="46" rx="10" fill="#111827" stroke="#243049" stroke-width="1.4"/><circle cx="98" cy="179" r="12" fill="#2ec5ff" opacity="0.18"/><text x="98" y="183" class="cy" font-size="12" font-weight="700" text-anchor="middle">1</text><text x="118" y="175" class="lbl" font-size="12.5" font-weight="600" text-anchor="start">map(func, iterdata)</text><text x="118" y="191" class="mut" font-size="10" text-anchor="start">create_map_job()</text><rect x="78" y="214" width="264" height="46" rx="10" fill="#111827" stroke="#243049" stroke-width="1.4"/><circle cx="98" cy="237" r="12" fill="#2ec5ff" opacity="0.18"/><text x="98" y="241" class="cy" font-size="12" font-weight="700" text-anchor="middle">2</text><text x="118" y="233" class="lbl" font-size="12.5" font-weight="600" text-anchor="start">serialize + partition</text><text x="118" y="249" class="mut" font-size="10" text-anchor="start">cloudpickle · partitioner</text><rect x="428" y="272" width="264" height="46" rx="10" fill="#111827" stroke="#243049" stroke-width="1.4"/><circle cx="448" cy="295" r="12" fill="#ff8c1a" opacity="0.18"/><text x="448" y="299" class="or" font-size="12" font-weight="700" text-anchor="middle">3</text><text x="468" y="291" class="lbl" font-size="12.5" font-weight="600" text-anchor="start">upload func_key + agg_data</text><text x="468" y="307" class="mut" font-size="10" text-anchor="start">InternalStorage.put</text><rect x="78" y="330" width="264" height="46" rx="10" fill="#111827" stroke="#243049" stroke-width="1.4"/><circle cx="98" cy="353" r="12" fill="#2ec5ff" opacity="0.18"/><text x="98" y="357" class="cy" font-size="12" font-weight="700" text-anchor="middle">4</text><text x="118" y="349" class="lbl" font-size="12.5" font-weight="600" text-anchor="start">Invoker.run()</text><text x="118" y="365" class="mut" font-size="10" text-anchor="start">ThreadPool → backend.invoke()</text><rect x="778" y="330" width="264" height="46" rx="10" fill="#111827" stroke="#243049" stroke-width="1.4"/><circle cx="798" cy="353" r="12" fill="#37d67a" opacity="0.18"/><text x="798" y="357" class="gr" font-size="12" font-weight="700" text-anchor="middle">5</text><text x="818" y="349" class="lbl" font-size="12.5" font-weight="600" text-anchor="start">worker starts</text><text x="818" y="365" class="mut" font-size="10" text-anchor="start">entry_point → function_handler</text><rect x="778" y="388" width="264" height="46" rx="10" fill="#111827" stroke="#243049" stroke-width="1.4"/><circle cx="798" cy="411" r="12" fill="#37d67a" opacity="0.18"/><text x="798" y="415" class="gr" font-size="12" font-weight="700" text-anchor="middle">6</text><text x="818" y="407" class="lbl" font-size="12.5" font-weight="600" text-anchor="start">JobRunner.run()</text><text x="818" y="423" class="mut" font-size="10" text-anchor="start">get func+data, execute call</text><rect x="428" y="446" width="264" height="46" rx="10" fill="#111827" stroke="#243049" stroke-width="1.4"/><circle cx="448" cy="469" r="12" fill="#ff8c1a" opacity="0.18"/><text x="448" y="473" class="or" font-size="12" font-weight="700" text-anchor="middle">7</text><text x="468" y="465" class="lbl" font-size="12.5" font-weight="600" text-anchor="start">put output + status</text><text x="468" y="481" class="mut" font-size="10" text-anchor="start">one object per call</text><path d="M342,179 C 390,179 380,295 428,295" fill="none" stroke="#ff8c1a" stroke-width="1.8" marker-end="url(#aor)"/><path d="M342,353 C 390,353 730,353 778,353" fill="none" stroke="#2ec5ff" stroke-width="1.8" marker-end="url(#acy)"/><path d="M910.0,434 C 750,434 720,469 692,469" fill="none" stroke="#ff8c1a" stroke-width="1.8" marker-end="url(#aor)"/><path d="M428,469 C 380,469 390,240 342,225" fill="none" stroke="#37d67a" stroke-width="1.8" stroke-dasharray="5 5" marker-end="url(#agr)"/><text x="400" y="250" class="gr" font-size="10" text-anchor="middle">wait() / get_result()</text><text x="400" y="266" class="mut2" font-size="9" text-anchor="middle">poll or RabbitMQ</text></svg>