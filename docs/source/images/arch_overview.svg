<defs><marker id="acy" markerWidth="9" markerHeight="9" refX="6.4" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#2563eb"/></marker><marker id="aor" markerWidth="9" markerHeight="9" refX="6.4" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#ea580c"/></marker><marker id="agr" markerWidth="9" markerHeight="9" refX="6.4" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#16a34a"/></marker><marker id="amut" markerWidth="9" markerHeight="9" refX="6.4" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#6b7280"/></marker></defs><text x="24" y="34" class="title" font-size="17" text-anchor="start">High-level architecture</text><text x="24" y="55" class="mut" font-size="12" text-anchor="start">A job travels from your Python client to the workers and back, through shared object storage.</text><rect x="24" y="80" width="470" height="400" rx="14" fill="#eff4ff" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6 5"/><text x="42" y="106" class="cy" font-size="12" font-weight="700" letter-spacing="0.4" text-anchor="start">CLIENT — your laptop / CI</text><rect x="46" y="122" width="426" height="44" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.3"/><rect x="46" y="122" width="4" height="44" rx="2" fill="#16a34a"/><text x="62" y="141.0" class="lbl m" font-size="13.5" font-weight="600" text-anchor="start">lithops.__init__</text><text x="62" y="159.0" class="mut" font-size="11" text-anchor="start">public API: FunctionExecutor, Storage</text><rect x="46" y="178" width="426" height="54" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.3"/><rect x="46" y="178" width="4" height="54" rx="2" fill="#2563eb"/><text x="62" y="202.0" class="lbl m" font-size="13.5" font-weight="600" text-anchor="start">FunctionExecutor</text><text x="62" y="220.0" class="mut" font-size="11" text-anchor="start">orchestrates the job, manages futures</text><rect x="46" y="246" width="207.0" height="54" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.3"/><rect x="46" y="246" width="4" height="54" rx="2" fill="#2563eb"/><text x="62" y="270.0" class="lbl m" font-size="13.5" font-weight="600" text-anchor="start">Config</text><text x="62" y="288.0" class="mut" font-size="11" text-anchor="start">loads &amp; validates</text><rect x="265.0" y="246" width="207.0" height="54" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.3"/><rect x="265.0" y="246" width="4" height="54" rx="2" fill="#2563eb"/><text x="281.0" y="270.0" class="lbl m" font-size="13.5" font-weight="600" text-anchor="start">Job creation</text><text x="281.0" y="288.0" class="mut" font-size="11" text-anchor="start">serialize + partition</text><rect x="46" y="314" width="207.0" height="54" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.3"/><rect x="46" y="314" width="4" height="54" rx="2" fill="#2563eb"/><text x="62" y="338.0" class="lbl m" font-size="13.5" font-weight="600" text-anchor="start">Invoker</text><text x="62" y="356.0" class="mut" font-size="11" text-anchor="start">dispatch calls</text><rect x="265.0" y="314" width="207.0" height="54" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.3"/><rect x="265.0" y="314" width="4" height="54" rx="2" fill="#2563eb"/><text x="281.0" y="338.0" class="lbl m" font-size="13.5" font-weight="600" text-anchor="start">JobMonitor</text><text x="281.0" y="356.0" class="mut" font-size="11" text-anchor="start">track completion</text><rect x="46" y="382" width="426" height="44" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.3"/><rect x="46" y="382" width="4" height="44" rx="2" fill="#ea580c"/><text x="62" y="401.0" class="lbl m" font-size="13.5" font-weight="600" text-anchor="start">InternalStorage</text><text x="62" y="419.0" class="mut" font-size="11" text-anchor="start">unified storage client</text><text x="46" y="452" class="mut2 m" font-size="11" text-anchor="start">ResponseFuture  →  wait() / get_result()</text><rect x="548" y="240" width="210" height="250" rx="14" fill="#fff5ec" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="6 5"/><text x="653.0" y="264" class="or" font-size="12" font-weight="700" letter-spacing="0.4" text-anchor="middle">OBJECT STORAGE</text><text x="653.0" y="282" class="mut" font-size="10" text-anchor="middle">shared client / worker bus</text><rect x="564" y="300" width="178" height="36" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.3"/><text x="576" y="316" class="or m" font-size="12" font-weight="600" text-anchor="start">func_key</text><text x="576" y="330" class="mut" font-size="10" text-anchor="start">code + modules</text><rect x="564" y="344" width="178" height="36" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.3"/><text x="576" y="360" class="or m" font-size="12" font-weight="600" text-anchor="start">agg_data</text><text x="576" y="374" class="mut" font-size="10" text-anchor="start">partition map</text><rect x="564" y="388" width="178" height="36" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.3"/><text x="576" y="404" class="or m" font-size="12" font-weight="600" text-anchor="start">call/output</text><text x="576" y="418" class="mut" font-size="10" text-anchor="start">results</text><rect x="564" y="432" width="178" height="36" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.3"/><text x="576" y="448" class="or m" font-size="12" font-weight="600" text-anchor="start">call/status</text><text x="576" y="462" class="mut" font-size="10" text-anchor="start">logs + stats</text><rect x="812" y="80" width="284" height="400" rx="14" fill="#f1faf3" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="6 5"/><text x="830" y="106" class="gr" font-size="12" font-weight="700" letter-spacing="0.4" text-anchor="start">COMPUTE BACKEND</text><text x="830" y="124" class="mut" font-size="10" text-anchor="start">FaaS · container · VM · localhost</text><rect x="860" y="154" width="184" height="250" rx="12" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.3"/><rect x="853" y="147" width="184" height="250" rx="12" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.3"/><rect x="846" y="140" width="184" height="250" rx="12" fill="#ffffff" stroke="#d0d7de" stroke-width="1.3"/><text x="862" y="166" class="lbl" font-size="13" font-weight="700" text-anchor="start">worker  (×N)</text><rect x="862" y="180" width="152" height="40" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.3"/><rect x="862" y="180" width="4" height="40" rx="2" fill="#db2777"/><text x="878" y="197.0" class="lbl m" font-size="13.5" font-weight="600" text-anchor="start">entry_point</text><text x="878" y="215.0" class="mut" font-size="11" text-anchor="start">container entrypoint</text><rect x="862" y="230" width="152" height="40" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.3"/><rect x="862" y="230" width="4" height="40" rx="2" fill="#16a34a"/><text x="878" y="247.0" class="lbl m" font-size="13.5" font-weight="600" text-anchor="start">function_handler</text><text x="878" y="265.0" class="mut" font-size="11" text-anchor="start">handler.py</text><rect x="862" y="280" width="152" height="40" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.3"/><rect x="862" y="280" width="4" height="40" rx="2" fill="#16a34a"/><text x="878" y="297.0" class="lbl m" font-size="13.5" font-weight="600" text-anchor="start">JobRunner</text><text x="878" y="315.0" class="mut" font-size="11" text-anchor="start">runs the call</text><rect x="862" y="330" width="152" height="40" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.3"/><rect x="862" y="330" width="4" height="40" rx="2" fill="#2563eb"/><text x="878" y="347.0" class="lbl m" font-size="13.5" font-weight="600" text-anchor="start">your function</text><text x="878" y="365.0" class="mut" font-size="11" text-anchor="start">user code + deps</text><path d="M494,404 C 508,404 518,360 548,360" fill="none" stroke="#ea580c" stroke-width="1.7" marker-end="url(#aor)"/><text x="521.0" y="394" class="or" font-size="10.5" text-anchor="middle">put func + data</text><path d="M404,342 C 690,220 750,230 812,230" fill="none" stroke="#2563eb" stroke-width="1.7" marker-end="url(#acy)"/><text x="700" y="220" class="cy" font-size="10.5" text-anchor="middle">invoke calls</text><path d="M862,290 C 802,290 788,360 758,360" fill="none" stroke="#ea580c" stroke-width="1.7" marker-end="url(#aor)"/><text x="830" y="274" class="or" font-size="10.5" text-anchor="middle">get / put</text><path d="M548,435 C 536,342 514,342 494,342" fill="none" stroke="#16a34a" stroke-width="1.7" stroke-dasharray="5 5" marker-end="url(#agr)"/><text x="521.0" y="445" class="gr" font-size="10.5" text-anchor="middle">poll status</text></svg>