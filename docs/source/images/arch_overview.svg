49" stroke-width="1.4"/><rect x="858" y="160" width="170" height="250" rx="12" fill="#0e1830" stroke="#243049" stroke-width="1.4"/><rect x="850" y="152" width="170" height="250" rx="12" fill="#111827" stroke="#243049" stroke-width="1.4"/><text x="866" y="178" class="lbl" font-size="13" font-weight="700" text-anchor="start">worker  (×N)</text><rect x="866" y="192" width="138" height="40" rx="12" fill="#111827" stroke="#243049" stroke-width="1.4"/><rect x="866" y="192" width="4" height="40" rx="2" fill="#ff8ab3"/><text x="882" y="209.0" class="lbl" font-size="14" font-weight="700" text-anchor="start">entry_point</text><text x="882" y="227.0" class="mut" font-size="11" text-anchor="start">container entrypoint</text><rect x="866" y="242" width="138" height="40" rx="12" fill="#111827" stroke="#243049" stroke-width="1.4"/><rect x="866" y="242" width="4" height="40" rx="2" fill="#2ec5ff"/><text x="882" y="259.0" class="lbl" font-size="14" font-weight="700" text-anchor="start">function_handler</text><text x="882" y="277.0" class="mut" font-size="11" text-anchor="start">handler.py</text><rect x="866" y="292" width="138" height="40" rx="12" fill="#111827" stroke="#243049" stroke-width="1.4"/><rect x="866" y="292" width="4" height="40" rx="2" fill="#2ec5ff"/><text x="882" y="309.0" class="lbl" font-size="14" font-weight="700" text-anchor="start">JobRunner</text><text x="882" y="327.0" class="mut" font-size="11" text-anchor="start">runs the call</text><rect x="866" y="342" width="138" height="40" rx="12" fill="#111827" stroke="#243049" stroke-width="1.4"/><rect x="866" y="342" width="4" height="40" rx="2" fill="#37d67a"/><text x="882" y="359.0" class="lbl" font-size="14" font-weight="700" text-anchor="start">your function</text><text x="882" y="377.0" class="mut" font-size="11" text-anchor="start">user code + deps</text><path d="M510,418 C 520,418 530,370 560,370" fill="none" stroke="#ff8c1a" stroke-width="1.8" marker-end="url(#aor)"/><text x="490" y="410" class="or" font-size=